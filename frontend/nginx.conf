server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 前端静态资源上传限制（含头像、图片消息等）
    client_max_body_size 50m;

    # gzip 压缩（对 /api 的 SSE 流不开，避免被缓冲）
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # SPA history 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理（含 SSE 流式对话）
    location /api/ {
        proxy_pass http://backend:8015/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接必需：关 gzip、关 buffer、关 cache
        gzip off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 静态资源缓存
    location ~* \.(?:css|js|ico|woff2?|ttf|svg|png|jpg|jpeg|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
